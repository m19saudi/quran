    <style>
        :root { --bg: #000000; --accent: #d4af37; --dim: #555; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #ccc; font-family: system-ui, -apple-system; overflow: hidden; height: 100vh; }

        .header { height: 60px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #111; position: relative; z-index: 100; }
        .val { color: var(--accent); font-weight: 600; font-size: 15px; cursor: pointer; }

        #reader-container { 
            height: calc(100vh - 120px); 
            width: 100vw; 
            position: relative; 
            background: #000;
            display: flex; align-items: center; justify-content: center;
        }

        /* نظام التبديل المتداخل (Cross-Fade) المريح للعين */
        .quran-page { 
            position: absolute; 
            max-height: 96%; max-width: 96%; 
            object-fit: contain; 
            transition: opacity 0.6s ease-in-out;
            opacity: 0;
            will-change: opacity;
            /* فلتر Eye-Care لتقليل الإجهاد */
            filter: brightness(0.8) contrast(1.05) sepia(0.05);
        }
        .active { opacity: 1; z-index: 10; }

        .footer { height: 60px; display: flex; align-items: center; justify-content: center; border-top: 1px solid #111; }
        .pace-tag { font-size: 11px; color: var(--dim); border: 1px solid #222; padding: 5px 15px; border-radius: 20px; background: #080808; }
    </style>
</head>
<body>

<div class="header">
    <div onclick="goToPage()">
        <div style="font-size: 10px; color: #555;">الصفحة الحالية</div>
        <div class="val" id="pageCount">--</div>
    </div>
    <div onclick="location.reload()" style="font-size: 10px; color: #555; text-align: left;">
        اليوم <span class="val" id="dayNum">--</span>
    </div>
</div>

<div id="reader-container">
    <img id="imgA" class="quran-page active">
    <img id="imgB" class="quran-page">
</div>

<div class="footer">
    <div class="pace-tag" id="paceInfo">جاري المزامنة...</div>
</div>

<script>
    const TARGETS = [22]; 
    for(let i=0; i<28; i++) { TARGETS.push(TARGETS[TARGETS.length-1] + 20); }
    TARGETS.push(604);

    let state = JSON.parse(localStorage.getItem('quran_v6_saad')) || { page: 1 };
    let activeId = 'A';

    function updateUI() {
        const nextId = activeId === 'A' ? 'B' : 'A';
        const currentImg = document.getElementById('img' + activeId);
        const nextImg = document.getElementById('img' + nextId);
        
        nextImg.src = `pages/1 (${state.page}).png`;
        
        nextImg.onload = () => {
            nextImg.classList.add('active');
            currentImg.classList.remove('active');
            activeId = nextId;
            
            // تحديث النصوص
            document.getElementById('pageCount').innerText = state.page;
            const sIdx = TARGETS.findIndex(t => state.page <= t);
            document.getElementById('dayNum').innerText = Math.ceil((sIdx + 1) / 2);
            
            const behind = (TARGETS[sIdx] || 604) - state.page;
            document.getElementById('paceInfo').innerText = behind > 0 ? `متبقي ${behind} صفحة للهدف` : "تم إنجاز الورد ✅";
            
            localStorage.setItem('quran_v6_saad', JSON.stringify(state));
        };
    }

    function goToPage() {
        const p = prompt("اذهب لصفحة:", state.page);
        if(p && !isNaN(p)) { state.page = Math.max(1, Math.min(604, parseInt(p))); updateUI(); }
    }

    let startX = 0;
    document.addEventListener('touchstart', e => startX = e.touches[0].clientX);
    document.addEventListener('touchend', e => {
        let diff = startX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 40) {
            if (diff < 0 && state.page < 604) { state.page++; updateUI(); }
            else if (diff > 0 && state.page > 1) { state.page--; updateUI(); }
        }
    });

    // تحميل أولي
    document.getElementById('imgA').src = `pages/1 (${state.page}).png`;
    updateUI();
</script>
</body>
