<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        :root { --bg: #000000; --card: #111111; --accent: #d4af37; --text: #e0e0e0; --dim: #444; --border: #1a1a1a; }
        [data-theme="light"] { --bg: #ffffff; --card: #f8f9fa; --accent: #2563eb; --text: #1e293b; --dim: #94a3b8; --border: #e2e8f0; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; height: 100vh; }

        .header { padding: 0 15px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; height: 60px; position: relative; z-index: 100; }
        .stats { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; }
        .val { color: var(--accent); font-weight: bold; font-size: 14px; cursor: pointer; }
        .progress-bar { position: absolute; top: 0; right: 0; height: 2px; background: var(--accent); transition: width 0.3s; z-index: 110; }

        #reader-container { height: calc(100vh - 120px); width: 100vw; position: relative; overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; }

        /* حركة الـ Slide الجديدة المريحة */
        .quran-page { 
            position: absolute; 
            max-height: 98%; max-width: 98%; 
            object-fit: contain; 
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            transition: transform 0.4s cubic-bezier(0.2, 0, 0, 1), opacity 0.3s ease;
            will-change: transform, opacity;
            background: #000;
        }

        .page-active { transform: translateX(0); z-index: 20; opacity: 1; }
        .page-entering-left { transform: translateX(100%); z-index: 30; }
        .page-entering-right { transform: translateX(-100%); z-index: 30; }
        .page-exit { opacity: 0.5; z-index: 10; }

        [data-theme="dark"] .quran-page { filter: brightness(0.85) contrast(1.1); }

        .footer { height: 60px; width: 100%; padding: 15px; background: var(--bg); border-top: 1px solid var(--border); text-align: center; position: relative; z-index: 100; }
        .pace-tag { font-size: 10px; color: var(--dim); border: 1px solid var(--border); padding: 6px 16px; border-radius: 20px; display: inline-block; background: var(--card); }

        #dashboard { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 200; padding: 30px 20px; flex-direction: column; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .day-dot { aspect-ratio: 1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; border: 1px solid var(--border); background: var(--card); }
        .dot-green { background: #22c55e !important; color: white; border: none; }
        .dot-yellow { background: #eab308 !important; color: white; border: none; }
        .btn-dash { padding: 15px; border-radius: 8px; background: var(--card); border: 1px solid var(--border); color: var(--text); margin-top: 15px; width: 100%; font-weight: bold; }
    </style>
</head>
<body data-theme="dark">

<div class="progress-bar" id="totalProgress"></div>

<div class="header">
    <div style="text-align: right;" onclick="goToPage()">
        <div class="stats" id="sessionLabel">الفترة الصباحية</div>
        <div class="val" id="pageCount">الصفحة 1</div>
    </div>
    <div onclick="toggleDash()" style="cursor:pointer; text-align: left;">
        <div class="stats">اليوم <span id="dayNum" class="val">1</span>/15</div>
    </div>
</div>

<div id="reader-container">
    <img id="activeImg" class="quran-page page-active">
</div>

<div id="dashboard">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <h2 style="margin:0; color:var(--accent)">الإحصائيات</h2>
        <button onclick="toggleDash()" style="background:none; border:none; color:var(--dim); font-size:24px;">✕</button>
    </div>
    <div class="grid" id="streakGrid" style="margin-bottom: 20px;"></div>
    <button class="btn-dash" onclick="toggleTheme()">🌓 تغيير المظهر</button>
    <button class="btn-dash" style="color:#ef4444;" onclick="resetSystem()">إعادة ضبط الختمة</button>
</div>

<div class="footer">
    <span class="pace-tag" id="paceInfo">متبقي -- صفحة للهدف</span>
</div>

<script>
    const TARGETS = [22]; 
    for(let i=0; i<28; i++) { TARGETS.push(TARGETS[TARGETS.length-1] + 20); }
    TARGETS.push(604);

    let state = JSON.parse(localStorage.getItem('quran_v6_saad')) || { page: 1, lastStopped: 0, theme: 'dark' };
    
    // الوظيفة الأساسية للتبديل المريح
    function changePage(direction) {
        const container = document.getElementById('reader-container');
        const oldImg = document.getElementById('activeImg');
        const newPageNum = direction === 'next' ? state.page + 1 : state.page - 1;

        if (newPageNum < 1 || newPageNum > 604) return;

        state.page = newPageNum;

        // إنشاء الصورة الجديدة
        const newImg = document.createElement('img');
        newImg.src = `pages/1 (${state.page}).png`;
        newImg.className = `quran-page ${direction === 'next' ? 'page-entering-left' : 'page-entering-right'}`;
        container.appendChild(newImg);

        // الانتظار قليلاً للتأكد من أن الصورة جاهزة للتحريك
        requestAnimationFrame(() => {
            newImg.classList.add('page-active');
            newImg.classList.remove('page-entering-left', 'page-entering-right');
            oldImg.classList.add('page-exit');
            
            // تنظيف الصورة القديمة بعد انتهاء الحركة
            setTimeout(() => {
                oldImg.remove();
                newImg.id = 'activeImg';
                updateStaticUI();
            }, 400);
        });
    }

    function updateStaticUI() {
        const info = getSessionInfo();
        document.getElementById('pageCount').innerText = `الصفحة ${state.page}`;
        document.getElementById('dayNum').innerText = info.day;
        document.getElementById('totalProgress').style.width = (state.page / 604 * 100) + '%';
        document.getElementById('sessionLabel').innerText = info.isMorning ? "الفترة الصباحية" : "الفترة المسائية";
        
        const behind = info.targetPage - state.page;
        document.getElementById('paceInfo').innerText = behind > 0 ? `متبقي ${behind} صفحة للهدف` : "أنهيت الورد الحالي ✅";
        save();
    }

    // إعداد الصورة الأولى عند تشغيل الموقع
    function init() {
        const img = document.getElementById('activeImg');
        img.src = `pages/1 (${state.page}).png`;
        updateStaticUI();
        document.body.setAttribute('data-theme', state.theme);
    }

    function getSessionInfo() {
        const hour = new Date().getHours();
        const isMorning = hour >= 0 && hour < 15;
        let sIdx = TARGETS.findIndex(t => state.page <= t);
        if (sIdx === -1) sIdx = 29;
        const day = Math.ceil((sIdx + 1) / 2);
        return { targetPage: TARGETS[sIdx], isMorning, day: Math.min(15, day) };
    }

    function toggleDash() {
        const d = document.getElementById('dashboard');
        const isOpen = d.style.display === 'flex';
        d.style.display = isOpen ? 'none' : 'flex';
        if(!isOpen) renderStreak();
    }

    function renderStreak() {
        const grid = document.getElementById('streakGrid');
        grid.innerHTML = '';
        for(let d=1; d<=15; d++) {
            const mTarget = TARGETS[(d-1)*2];
            const eTarget = TARGETS[(d-1)*2 + 1];
            let status = state.page > eTarget ? 'dot-green' : (state.page > mTarget ? 'dot-yellow' : '');
            grid.innerHTML += `<div class="day-dot ${status}">${d}</div>`;
        }
    }

    function toggleTheme() {
        state.theme = state.theme === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', state.theme);
        save();
    }

    function save() { localStorage.setItem('quran_v6_saad', JSON.stringify(state)); }
    function resetSystem() { if(confirm("إعادة ضبط؟")) { state.page = 1; save(); location.reload(); } }

    let startX = 0;
    document.body.addEventListener('touchstart', e => startX = e.touches[0].clientX);
    document.body.addEventListener('touchend', e => {
        let diff = startX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 40) {
            if (diff < 0) changePage('next');
            else changePage('prev');
        }
    });

    init();
</script>
</body>
</html>
