<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quran Sprint - v5</title>
    <style>
        :root { 
            --bg: #000000; --card: #111111; --accent: #d4af37; --text: #e0e0e0; --dim: #444; --border: #1a1a1a;
        }
        [data-theme="light"] {
            --bg: #ffffff; --card: #f8f9fa; --accent: #2563eb; --text: #1e293b; --dim: #94a3b8; --border: #e2e8f0;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; transition: background 0.3s, color 0.3s; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; height: 100vh; }

        .header { padding: 0 15px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; height: 60px; }
        .stats { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; }
        .val { color: var(--accent); font-weight: bold; font-size: 14px; cursor: pointer; }
        .progress-bar { position: absolute; top: 0; right: 0; height: 2px; background: var(--accent); transition: width 0.3s; z-index: 10; }

        #reader-container { height: calc(100vh - 120px); width: 100vw; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .quran-page { max-height: 98%; max-width: 98%; object-fit: contain; pointer-events: none; transition: opacity 0.15s ease-in-out; }
        [data-theme="dark"] .quran-page { filter: brightness(0.85) contrast(1.1); } /* ميزة حماية العين */

        .footer { height: 60px; width: 100%; padding: 15px; background: var(--bg); border-top: 1px solid var(--border); text-align: center; }
        .pace-tag { font-size: 10px; color: var(--dim); border: 1px solid var(--border); padding: 6px 16px; border-radius: 20px; display: inline-block; }

        /* Dashboard Styles */
        #dashboard { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 200; padding: 30px 20px; flex-direction: column; overflow-y: auto; }
        .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .day-dot { aspect-ratio: 1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; border: 1px solid var(--border); background: var(--card); }
        .dot-green { background: #22c55e !important; color: white !important; border: none; }
        .dot-yellow { background: #eab308 !important; color: white !important; border: none; }
        .btn-dash { padding: 15px; border-radius: 8px; background: var(--card); border: 1px solid var(--border); color: var(--text); margin-top: 15px; width: 100%; font-weight: bold; }

        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 300; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .btn-continue { background: var(--accent); color: #000; border: none; padding: 15px 40px; border-radius: 4px; font-weight: bold; margin-top: 20px; width: 80%; }
        #loader { position: absolute; border: 2px solid transparent; border-top: 2px solid var(--accent); border-radius: 50%; width: 20px; height: 20px; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body data-theme="dark">

<div class="progress-bar" id="totalProgress"></div>

<div class="header">
    <div style="text-align: right;" onclick="goToPage()">
        <div class="stats" id="sessionLabel">الفترة الصباحية</div>
        <div class="val" id="pageCount">1 / 604</div>
    </div>
    <div onclick="toggleDash()" style="cursor:pointer; text-align: left;">
        <div class="stats">اليوم <span id="dayNum" class="val">1</span>/15</div>
    </div>
</div>

<div id="reader-container">
    <div id="loader"></div>
    <img src="" id="pageImg" class="quran-page">
</div>

<div id="dashboard">
    <div class="dash-header">
        <h2 style="margin:0; color:var(--accent)">الإحصائيات</h2>
        <button onclick="toggleDash()" style="background:none; border:none; color:var(--dim); font-size:24px;">✕</button>
    </div>
    <div style="background:var(--card); padding:20px; border-radius:12px; border:1px solid var(--border); margin-bottom:20px;">
        <div class="stats" style="margin-bottom:5px">نسبة الإنجاز</div>
        <div style="font-size: 32px; font-weight: bold;" id="dashPercent">0%</div>
        <div id="dashRem" style="font-size: 11px; color:var(--dim); margin-top:5px">604 صفحة متبقية</div>
    </div>
    <div class="grid" id="streakGrid"></div>
    <div style="margin-top: auto;">
        <button class="btn-dash" onclick="toggleTheme()">🌓 تغيير المظهر</button>
        <button class="btn-dash" style="color:#ef4444;" onclick="resetSystem()">إعادة ضبط الختمة</button>
    </div>
</div>

<div id="overlay">
    <h2 id="overlayTitle" style="color:var(--accent)">انتهى الورد</h2>
    <p id="overlayMsg" style="color:#888;"></p>
    <button class="btn-continue" onclick="hideOverlay()">المتابعة الآن</button>
</div>

<div class="footer">
    <span class="pace-tag" id="paceInfo">متبقي -- صفحة للهدف</span>
</div>

<script>
    const TARGETS = [22]; 
    for(let i=0; i<28; i++) { TARGETS.push(TARGETS[TARGETS.length-1] + 20); }
    TARGETS.push(604);

    let state = JSON.parse(localStorage.getItem('quran_v5_saad')) || { page: 1, lastStopped: 0, theme: 'dark' };

    // ميزة التحميل الفائق (Super Pre-loader)
    function preloadImages(currentPage) {
        for (let i = 1; i <= 5; i++) {
            if (currentPage + i <= 604) {
                const img = new Image();
                img.src = `pages/1 (${currentPage + i}).png`;
            }
        }
    }

    function toggleTheme() {
        state.theme = state.theme === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', state.theme);
        save();
    }

    function toggleDash() {
        const d = document.getElementById('dashboard');
        const isOpen = d.style.display === 'flex';
        d.style.display = isOpen ? 'none' : 'flex';
        if(!isOpen) renderStreak();
    }

    function renderStreak() {
        const grid = document.getElementById('streakGrid');
        grid.innerHTML = '';
        for(let d=1; d<=15; d++) {
            const mTarget = TARGETS[(d-1)*2];
            const eTarget = TARGETS[(d-1)*2 + 1];
            let status = '';
            if (state.page > eTarget) status = 'dot-green';
            else if (state.page > mTarget) status = 'dot-yellow';
            grid.innerHTML += `<div class="day-dot ${status}">${d}</div>`;
        }
        document.getElementById('dashPercent').innerText = Math.round((state.page / 604) * 100) + '%';
        document.getElementById('dashRem').innerText = `${604 - state.page} صفحة متبقية`;
    }

    function updateUI() {
        const img = document.getElementById('pageImg');
        const loader = document.getElementById('loader');
        const info = getSessionInfo();
        
        const currentPath = `pages/1 (${state.page}).png`;
        
        loader.style.display = 'block';
        img.src = currentPath;

        img.onload = () => {
            loader.style.display = 'none';
            img.style.opacity = '1';
            preloadImages(state.page); // تحميل الصفحات القادمة فور نجاح التحميل الحالي
        };

        img.onerror = () => {
            if (img.src.includes(".png")) img.src = currentPath.replace(".png", ".jpg");
            loader.style.display = 'none';
        };

        document.getElementById('pageCount').innerText = `الصفحة ${state.page}`;
        document.getElementById('dayNum').innerText = info.day;
        document.getElementById('totalProgress').style.width = (state.page / 604 * 100) + '%';
        document.getElementById('sessionLabel').innerText = info.isMorning ? "الفترة الصباحية" : "الفترة المسائية";

        const behind = info.targetPage - state.page;
        const paceTag = document.getElementById('paceInfo');
        paceTag.innerText = behind > 0 ? `متبقي ${behind} صفحة للهدف` : "أنهيت الورد الحالي ✅";
        
        if (state.page === info.targetPage && state.lastStopped !== state.page) {
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('overlayMsg').innerText = `وصلت لصفحة ${state.page}`;
        }
        save();
    }

    function getSessionInfo() {
        const hour = new Date().getHours();
        const isMorning = hour >= 0 && hour < 15;
        let sIdx = TARGETS.findIndex(t => state.page <= t);
        if (sIdx === -1) sIdx = 29;
        const day = Math.ceil((sIdx + 1) / 2);
        return { targetPage: TARGETS[sIdx], isMorning, day: day > 15 ? 15 : day };
    }

    function goToPage() {
        const target = prompt("اذهب إلى صفحة:", state.page);
        if (target && !isNaN(target)) {
            state.page = parseInt(target);
            state.lastStopped = state.page - 1;
            updateUI();
        }
    }

    function hideOverlay() {
        state.lastStopped = state.page;
        document.getElementById('overlay').style.display = 'none';
        save();
    }

    function save() { localStorage.setItem('quran_v5_saad', JSON.stringify(state)); }
    function resetSystem() { if(confirm("بدء من جديد؟")) { state.page = 1; save(); location.reload(); } }

    let startX = 0;
    document.getElementById('reader-container').addEventListener('touchstart', e => startX = e.touches[0].clientX);
    document.getElementById('reader-container').addEventListener('touchend', e => {
        let diff = startX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 50) {
            if (diff < 0 && state.page < 604) { state.page++; updateUI(); }
            else if (diff > 0 && state.page > 1) { state.page--; updateUI(); }
        }
    });

    document.body.setAttribute('data-theme', state.theme);
    updateUI();
</script>
</body>
</html>
